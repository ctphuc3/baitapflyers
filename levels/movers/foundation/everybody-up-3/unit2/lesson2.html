button {

.line {

  font-size: 16px;
}

.line:focus {

}

.wrong {

}

<script>
function checkA() {
  const answers = {
    a1: "buy groceries",
    a2: "borrow books",
    a3: "kick a ball",
    a4: "mail letters"
  };

  Object.keys(answers).forEach(q => {
    const options = document.querySelectorAll(`input[name="${q}"]`);
    options.forEach(opt => {
      const label = opt.parentElement;
      label.classList.remove("correct", "wrong");

      if (opt.value === answers[q]) {
        label.classList.add("correct");
      }

      if (opt.checked && opt.value !== answers[q]) {
        label.classList.add("wrong");
      }
    });
  });
}

function checkB() {
  const answers = {
    b1: "buy",
    b2: "borrow",
    b3: "kick",
    b4: "mail"
  };

  Object.keys(answers).forEach(q => {
    const options = document.querySelectorAll(`input[name="${q}"]`);
    options.forEach(opt => {
      const label = opt.parentElement;
      label.classList.remove("correct", "wrong");

      if (opt.value === answers[q]) {
        label.classList.add("correct");
      }

      if (opt.checked && opt.value !== answers[q]) {
        label.classList.add("wrong");
      }
    });
  });
}

function highlightDiff(inputEl, correctText) {
  const userWords = inputEl.value.trim().split(/\s+/);
  const correctWords = correctText.trim().split(/\s+/);

  let result = "";
  const maxLen = Math.max(userWords.length, correctWords.length);

  for (let i = 0; i < maxLen; i++) {
    const uWord = userWords[i] || "";
    const cWord = correctWords[i] || "";

    if (uWord === cWord) {
      result += uWord + " "; // đúng → giữ nguyên
    } else {
      if (uWord) {
        result += `<span class="char-wrong">${uWord}</span> `;
      } else {
        result += `<span class="char-wrong">${cWord}</span> `;
      }
    }
  }

  const div = document.createElement("div");
  div.innerHTML = result.trim();
  div.className = "line-text";
  inputEl.replaceWith(div);
}

function checkC() {
  const answers = {
    c2q: "What are they doing at the movie theater?",
    c2a: "They’re watching a movie.",
    c3q: "What are they doing at the park?",
    c3a: "They’re kicking a ball.",
    c4q: "What are they doing at the department store?",
    c4a: "They’re shopping.",
    c5q: "What are they doing at the library?",
    c5a: "They’re borrowing books.",
    c6q: "What are they doing at the post office?",
    c6a: "They’re mailing a letter."
  };

  Object.keys(answers).forEach(id => {
    const input = document.getElementById(id);
    if (input) {
      highlightDiff(input, answers[id]);
    }
  });
}
