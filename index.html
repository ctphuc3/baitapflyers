<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

let scene, camera, renderer, mesh;
let bgScene, bgCamera, bgTarget;
let mouse = new THREE.Vector2(-10.0, -10.0); // đặt ngoài màn hình

// ===== TOUCH WATER EFFECT CONTROL =====
let lastTouchTime = 0;
const TOUCH_COOLDOWN = 1000; // ms

init();
animate();

function init() {
  scene = new THREE.Scene();

  // --- Background scene for refraction ---
  bgScene = new THREE.Scene();
  bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  const bgGeo = new THREE.PlaneGeometry(2, 2);
  const bgMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;

      void main() {
        vec3 sky = mix(
          vec3(0.88, 0.94, 0.98),   // almost white sky blue
          vec3(0.75, 0.88, 0.96),   // very light horizon blue
          smoothstep(0.0, 1.0, vUv.y)
        );
        gl_FragColor = vec4(sky, 1.0);
      }
    `
  });
  bgScene.add(new THREE.Mesh(bgGeo, bgMat));
  bgTarget = new THREE.WebGLRenderTarget(
    window.innerWidth,
    window.innerHeight
  );

  camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.domElement.id = "water-canvas";
  document.body.appendChild(renderer.domElement);

  const geometry = new THREE.PlaneGeometry(2, 2);

  const material = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uMouse: { value: mouse },
      uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      uBackground: { value: bgTarget.texture },
      uWind: { value: new THREE.Vector2(0.6, 0.2) },
      uThemeColor: { value: new THREE.Vector3(0.84, 0.93, 0.96) },
      uThemeTarget: { value: new THREE.Vector3(0.84, 0.93, 0.96) }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position, 1.0);
      }
    `,
    fragmentShader: `
precision highp float;
varying vec2 vUv;
uniform float uTime;
uniform vec2 uMouse;
uniform vec2 uWind;
uniform sampler2D uBackground;
uniform vec3 uThemeColor;

/* ===== wave height field ===== */
float heightField(vec2 p) {
  float h = 0.0;
  h += sin(dot(p, uWind) * 14.0 + uTime * 1.8) * 0.08;
  h += sin(p.x * 22.0 - uTime * 1.3) * 0.05;
  h += sin((p.x + p.y) * 12.0 + uTime * 0.9) * 0.04;

  return h;
}

/* ===== compute fake normal from height ===== */
vec3 getNormal(vec2 p) {
  float eps = 0.002;
  float h  = heightField(p);
  float hx = heightField(p + vec2(eps, 0.0));
  float hy = heightField(p + vec2(0.0, eps));
  return normalize(vec3(h - hx, h - hy, eps));
}

void main() {
  vec2 uv = vUv;

  float h = heightField(uv);
  vec3 normal = getNormal(uv);

  /* ===== refraction ===== */
  vec2 refractUV = uv + normal.xy * 0.08;
  vec3 refracted = texture2D(uBackground, refractUV).rgb;

  /* ===== reflection (mirror horizon) ===== */
  vec2 reflectUV = vec2(refractUV.x, 1.0 - refractUV.y);
  vec3 reflected = texture2D(uBackground, reflectUV).rgb;

  /* ===== lighting ===== */
  vec3 lightDir = normalize(vec3(-0.3, 0.8, 1.0));
  float diffuse = clamp(dot(normal, lightDir), 0.0, 1.0);

  float fresnel = pow(1.0 - dot(normal, vec3(0.0, 0.0, 1.0)), 3.0);

  /* ===== combine ===== */
  vec3 waterTint = uThemeColor;
  vec3 color = mix(refracted, reflected, fresnel * 0.55);
  color = mix(color, waterTint, 0.12);     // tint cực nhẹ
  color *= 0.68 + diffuse * 0.42;          // mềm hơn, dịu
  color += fresnel * 0.08;                 // giảm viền trắng

  /* ===== horizon darkening ===== */
  float horizon = smoothstep(0.2, 0.75, uv.y);
  color *= mix(0.90, 1.0, horizon);

  gl_FragColor = vec4(color, 1.0);
}
`
  });

  mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  window.addEventListener("resize", onResize);
}

function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  bgTarget.setSize(window.innerWidth, window.innerHeight);
  camera.updateProjectionMatrix();
}

function animate(t) {
  bgScene.children[0].material.uniforms.uTime.value = t * 0.0003;

  renderer.setRenderTarget(bgTarget);
  renderer.render(bgScene, bgCamera);
  renderer.setRenderTarget(null);

  mesh.material.uniforms.uTime.value = t * 0.0005;
  // Làm sóng tan dần khi không chạm
  mouse.lerp(new THREE.Vector2(-10.0, -10.0), 0.05);
  // mesh.material.uniforms.uThemeColor.value.lerp(
  //   mesh.material.uniforms.uThemeTarget.value,
  //   0.04
  // );
  renderer.render(scene, camera);

  requestAnimationFrame(animate);
}

// ===== UI LOGIC: STARERS =====
const contentArea = document.getElementById("content-area");
const searchInput = document.querySelector(".search-input");
const suggestionBox = document.getElementById("search-suggestions");
let SEARCH_INDEX = [];

// ===== A) BUILD SEARCH INDEX TOÀN CỤC =====
function buildSearchIndex() {
  SEARCH_INDEX = [];

  // ===== STARERS – AUTHENTIC EXAMS =====
  for (let exam = 1; exam <= 4; exam++) {
    for (let test = 1; test <= 3; test++) {
      ["Listening", "Reading & Writing", "Speaking"].forEach(skill => {
        const url = getSkillLink(skill, exam, test);

        SEARCH_INDEX.push({
          title: skill,
          meta: `Authentic Exam ${exam} Test ${test} Starters`,
          level: "Starters",
          url,
          render: () => {
            const c = document.createElement("div");
            c.className = "card";
            c.style.cursor = "pointer";

            const t = document.createElement("div");
            t.textContent = skill;

            const s = document.createElement("div");
            s.className = "subtext";
            s.textContent = `(Authentic Exam ${exam} · Test ${test} · Starters)`;

            c.appendChild(t);
            c.appendChild(s);

              c.onclick = () => {
                window.open(url, "_blank");
              };
            return c;
          }
        });
      });
    }

    // Card cấp Exam (không có link)
    SEARCH_INDEX.push({
      title: `Authentic Exam ${exam}`,
      meta: `Authentic Exam ${exam} Starters`,
      level: "Starters",
      url: "",
      render: () => {
        const c = document.createElement("div");
        c.className = "card";
        c.textContent = `Authentic Exam ${exam}`;
        c.onclick = () => showExamTests(exam);
        return c;
      }

  // ===== STARTERS – SKILLS BUILDER =====
  for (let unit = 1; unit <= 5; unit++) {
    ["Listening", "Reading & Writing"].forEach(skill => {
      let skillSlug = skill === "Listening" ? "listening" : "reading";
      const url = `levels/starters/exams/skill-builder/unit-${unit}/${skillSlug}.html`;

      SEARCH_INDEX.push({
        title: skill,
        meta: `Skills builder Unit ${unit} Starters`,
        level: "Starters",
        url,
        render: () => {
          const c = document.createElement("div");

          const s = document.createElement("div");

          c.appendChild(t);
          c.appendChild(s);

          c.onclick = () => {

          };
          return c;
        }
      });
    });
  }
}

// ===== LOCALSTORAGE RECENT LESSONS =====
const STORAGE_KEY = "recentLessons";
const MAX_RECENT = 8;

function saveRecentLesson(item) {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  const filtered = data.filter(
    d => !(d.label === item.label && d.meta === item.meta)
  );
  filtered.unshift(item);
  const limited = filtered.slice(0, MAX_RECENT);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(limited));
}

function loadRecentLessons() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
}

// ===== A) TIỆN ÍCH SEARCH: normalizeText, fuzzyScore =====
function normalizeText(str) {
  return str
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function fuzzyScore(query, text) {
  const q = normalizeText(query);
  const t = normalizeText(text);

  if (!q || !t) return 0;
  if (t.includes(q)) return 100;

  let score = 0;
  const qWords = q.split(" ");
  qWords.forEach(w => {
    if (t.includes(w)) score += 20;
  });

  // ký tự gần đúng
  let qi = 0;
  for (let i = 0; i < t.length && qi < q.length; i++) {
    if (t[i] === q[qi]) qi++;
  }
  score += qi * 2;

  return score;
}

// ===== A) KHAI BÁO LINK CHO 3 KỸ NĂNG =====
// (Đã xoá object skillLinks cũ)

function getSkillLink(skill, examNumber, testNumber) {
  const base = "levels/starters/exams/listening-main.html";

  const skillSlug = skill.toLowerCase().includes("listening") ? "listening" :
                    skill.toLowerCase().includes("reading") ? "reading" :
                    "speaking";

  // map exam → set (01 → 04)
  const set = String(examNumber).padStart(2, "0");
  const test = String(testNumber).padStart(2, "0");

  return `${base}?type=exam&set=${set}&test=${test}&skill=${skillSlug}`;
}

// ===== HIỂN THỊ CURRENT LESSONS =====
function showCurrentLessons() {
  clearContent();
  contentArea.classList.add("recent-mode");

  const lessons = loadRecentLessons();
  // Remove duplicates by label+meta
  const uniqueMap = new Map();
  lessons.forEach(l => {
    const key = l.label + "|" + l.meta;
    if (!uniqueMap.has(key)) {
      uniqueMap.set(key, l);
    }
  });
  const uniqueLessons = Array.from(uniqueMap.values());

  if (uniqueLessons.length === 0) {
    const empty = document.createElement("div");
    empty.className = "card";
    empty.textContent = "No recent lessons";
    contentArea.appendChild(empty);
    return;
  }

  uniqueLessons.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.cursor = "pointer";

    const title = document.createElement("div");
    title.textContent = item.label;

    const sub = document.createElement("div");
    sub.className = "subtext";
    sub.textContent = item.meta;

    card.appendChild(title);
    card.appendChild(sub);

    card.onclick = () => {
      window.open(item.url, "_blank");
    };
    contentArea.appendChild(card);
  });
}

// ===== C) HÀM HIỂN THỊ KẾT QUẢ SEARCH =====
function showSearchResultsInContent(keyword) {
  // ===== SEARCH ALIAS EXPANSION (sb → skills builder, rw → reading writing, ls → listening) =====
  let expanded = keyword.toLowerCase();

  expanded = expanded
    .replace(/\bsb\b/g, "skills builder")
    .replace(/\brw\b/g, "reading writing")
    .replace(/\bls\b/g, "listening")
    .replace(/\bu(\d+)\b/g, "unit $1");

  keyword = expanded;
  clearContent();

  const results = SEARCH_INDEX
    .map(item => ({
      item,
      score: fuzzyScore(keyword, item.title + " " + item.meta)
    }))
    .filter(r => r.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 6); // show top 6 closest results

  if (results.length === 0) {
    const empty = document.createElement("div");
    empty.className = "card";
    empty.textContent = "No matching results";
    contentArea.appendChild(empty);
    return;
  }

  results.forEach(r => {
    const card = r.item.render
      ? r.item.render()
      : (() => {
          const c = document.createElement("div");
          c.className = "card";
          c.textContent = `${r.item.title}`;
          c.onclick = () => {
            window.open(r.item.url, "_blank");
          };
          return c;
        })();

    contentArea.appendChild(card);
  });
}

// ===== TOUCH WATER EFFECT ONLY WHEN UI IS HIDDEN =====
const waterCanvas = document.getElementById("water-canvas");

waterCanvas.addEventListener("pointerdown", e => {
  if (!uiRoot.classList.contains("ui-hidden")) return;

  const now = performance.now();
  if (now - lastTouchTime < TOUCH_COOLDOWN) return;
  lastTouchTime = now;

  const rect = waterCanvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = 1.0 - (e.clientY - rect.top) / rect.height;

  mouse.set(x, y);
});
