<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson 3 - Story</title>
  <link rel="stylesheet" href="../../../../../assets/css/style.css">
  <style>
    .lesson3-page .placeholder-image { display:block; width:100%; border:1px dashed #999; border-radius:12px; background:#f7f7f7; object-fit:contain; }
    .lesson3-page .story-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .lesson3-page .story-card { position:relative; }
    .lesson3-page .story-card img { height:225px; }
    .lesson3-page .number-box { position:absolute; right:12px; bottom:12px; width:42px; margin:0; background:#fff; font-size:20px; }
    .lesson3-page .word-bank { display:flex; gap:32px; justify-content:center; margin-bottom:16px; padding:11px 18px; border:1px solid #aaa; border-radius:12px; font-weight:700; }
    .lesson3-page .word-bank .used { color:#777; text-decoration:line-through; }
    .lesson3-page .write-row { display:grid; grid-template-columns:28px 205px 1fr; gap:10px; align-items:center; margin:14px 0; }
    .lesson3-page .write-row img { height:105px; }
    .lesson3-page .example-answer { padding:8px 10px; border-bottom:2px solid #888; color:#777; }
    .lesson3-page .connect-row { display:grid; grid-template-columns:28px 190px 1fr; gap:10px; align-items:center; margin:12px 0; }
    .lesson3-page .connect-row img { height:90px; }
    .lesson3-page .choice-box { display:grid; grid-template-columns:repeat(4, auto); gap:8px 14px; padding:12px; border:1px solid #999; }
    .lesson3-page .choice-box label { cursor:pointer; white-space:nowrap; }
    .lesson3-page .choice-box input { margin:0 4px 0 0; }
    .lesson3-page .d-connect-board { display:flex; flex-direction:column; gap:14px; }
    .lesson3-page .d-connect-row { display:grid; grid-template-columns:24px minmax(130px, 1fr) 12px 78px 12px minmax(120px, 1fr) 125px; gap:8px; align-items:center; min-width:0; }
    .lesson3-page .d-number { align-self:start; padding-top:20px; }
    .lesson3-page .speech-bubble { position:relative; min-width:0; padding:13px 10px 10px; border:2px solid #555; border-radius:16px; background:#fff; }
    .lesson3-page .speech-bubble::after { content:""; position:absolute; top:34px; width:18px; height:18px; background:#fff; transform:rotate(45deg); }
    .lesson3-page .speech-left::after { left:-10px; border-left:2px solid #555; border-bottom:2px solid #555; }
    .lesson3-page .speech-right::after { right:-10px; border-right:2px solid #555; border-top:2px solid #555; }
    .lesson3-page .speech-bubble .line-input { box-sizing:border-box; position:relative; z-index:1; width:100%; margin:0; padding:5px 3px; border:0; border-bottom:2px solid #888; border-radius:0; background:transparent; text-align:center; }
    .lesson3-page .partial-sentence { position:relative; z-index:1; display:flex; align-items:flex-end; min-width:0; border-bottom:2px solid #888; }
    .lesson3-page .partial-sentence .line-input { flex:1 1 auto; min-width:35px; border-bottom:0; }
    .lesson3-page .fixed-suffix { flex:0 0 auto; padding:5px 3px; color:#777; font-size:18px; line-height:1.2; white-space:nowrap; user-select:none; }
    .lesson3-page .speech-example { position:relative; z-index:1; min-height:26px; padding:5px 3px; border-bottom:2px solid #888; color:#777; text-align:center; }
    .lesson3-page .connect-dot { width:11px; height:11px; border-radius:50%; background:#111; }
    .lesson3-page .d-link select { width:100%; margin:0; padding:7px 3px; font-size:13px; }
    .lesson3-page .d-connect-row img { height:82px; }
    .lesson3-page .d-feedback { grid-column:2 / -1; width:100%; }
    .lesson3-page select { width:100%; padding:8px; border:1px solid #aaa; border-radius:8px; background:#fff; }
    .lesson3-page .personal-item { margin:14px 0 22px; }
    .lesson3-page .personal-item label { display:block; margin-bottom:7px; }
    .lesson3-page .personal-item .line-input { box-sizing:border-box; width:100%; text-align:left; }
    .lesson3-page .answer-text { box-sizing:border-box; display:block; width:100%; min-width:0; margin-top:8px; padding:7px 10px; border-left:4px solid #2e9d50; border-radius:4px; background:#effaf2; line-height:1.35; white-space:nowrap; overflow-x:auto; }
    .lesson3-page .write-row > .answer-text { grid-column:3; grid-row:2; }
    .lesson3-page .choice-box > .answer-text { grid-column:1 / -1; }
    .lesson3-page .d-feedback.answer-text { margin-top:0; }
    .lesson3-page .personal-item > .answer-text { width:100%; }
    .lesson3-page .story-card > .answer-text { position:absolute; right:12px; bottom:62px; width:auto; max-width:calc(100% - 24px); margin:0; background:rgba(239, 250, 242, 0.96); }
    @media (max-width:700px) {
      .lesson3-page .story-grid { grid-template-columns:1fr; }
      .lesson3-page .write-row, .lesson3-page .connect-row { grid-template-columns:28px 1fr; }
      .lesson3-page .write-row img, .lesson3-page .connect-row img { grid-column:2; }
      .lesson3-page .write-row > .answer-text { grid-column:2; grid-row:auto; }
      .lesson3-page .choice-box { grid-template-columns:1fr 1fr; }
      .lesson3-page .d-connect-row { grid-template-columns:24px minmax(105px, 1fr) 10px 70px 10px minmax(105px, 1fr); gap:6px; }
      .lesson3-page .d-connect-row img { grid-column:6; width:100%; height:70px; }
      .lesson3-page .d-feedback { grid-column:2 / -1; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card workbook-page lesson3-page">
    <div class="title">Lesson 3 - Story</div>

    <div class="workbook-spread">
      <div class="workbook-left">
        <div class="section section-a">
          <div class="subtitle"><span class="section-label">A</span><span>Number.</span></div>
          <!-- Replace each https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-a-1.png value with your image link. CSS keeps every image at a readable size. -->
          <div class="story-grid">
            <div class="story-card"><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-a-1.png" alt="I like your shirts. Thank you!"><input class="number-box" data-type="text" data-answer="3" aria-label="Story picture 1 number"></div>
            <div class="story-card"><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-a-2.png" alt="I want to be older. Me, too."><input class="number-box" data-type="text" data-answer="1" aria-label="Story picture 2 number"></div>
            <div class="story-card"><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-a-3.png" alt="I like his shirt. It's so cool."><input class="number-box" data-type="text" data-answer="2" aria-label="Story picture 3 number"></div>
            <div class="story-card"><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-a-4.png" alt="We can wear cool clothes, too."><input class="number-box" data-type="text" data-answer="4" aria-label="Story picture 4 number"></div>
          </div>
        </div>

        <div class="section section-b">
          <div class="subtitle"><span class="section-label">B</span><span>Write.</span></div>
          <div class="word-bank"><span class="used">older</span><span>taller</span><span>faster</span><span>stronger</span></div>
          <div class="write-row"><b>1.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-b-1.png" alt="A child wants to be older"><div class="example-answer">I want to be older.</div></div>
          <div class="write-row"><b>2.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-b-2.png" alt="Children running"><input class="line-input" data-type="text" data-answer="I want to be faster." aria-label="Write sentence 2"></div>
          <div class="write-row"><b>3.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-b-3.png" alt="A child lifting weights"><input class="line-input" data-type="text" data-answer="I want to be stronger." aria-label="Write sentence 3"></div>
          <div class="write-row"><b>4.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-b-4.png" alt="A child reaching a high shelf"><input class="line-input" data-type="text" data-answer="I want to be taller." aria-label="Write sentence 4"></div>
        </div>
      </div>

      <div class="workbook-right">
        <div class="section section-c">
          <div class="subtitle"><span class="section-label">C</span><span>Connect.</span></div>
          <div class="connect-row"><b>1.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-c-1.png" alt="A girl compliments another girl's dress"><div class="choice-box" data-type="mcq" data-answer="I like your dress."><label><input type="radio" name="c1" value="I like your dress.">I like your dress.</label><label><input type="radio" name="c1" value="She has this shirt.">She has this shirt.</label></div></div>
          <div class="connect-row"><b>2.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-c-2.png" alt="A girl points at a skirt"><div class="choice-box" data-type="mcq" data-answer="I like that skirt."><label><input type="radio" name="c2" value="I like that skirt.">I like that skirt.</label><label><input type="radio" name="c2" value="They wear your shirt.">They wear your shirt.</label></div></div>
          <div class="connect-row"><b>3.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-c-3.png" alt="Children look at a girl's boots"><div class="choice-box" data-type="mcq" data-answer="Let's look at her boots."><label><input type="radio" name="c3" value="Let's look at her boots.">Let's look at her boots.</label><label><input type="radio" name="c3" value="Look to our shirt.">Look to our shirt.</label></div></div>
        </div>

        <div class="section section-d">
          <div class="subtitle"><span class="section-label">D</span><span>Connect and write.</span></div>
          <div class="d-connect-board">
            <div class="d-connect-row"><b class="d-number">1.</b><div class="speech-bubble speech-left"><div class="speech-example">Nice shoes!</div></div><span class="connect-dot"></span><div class="d-link"><select class="example-link" aria-label="Example connection" disabled><option>→ 3</option></select></div><span class="connect-dot"></span><div class="speech-bubble speech-right"><input class="line-input" data-type="text" data-answer="Thank you." aria-label="Reply for picture 1"></div><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-d-1.png" alt="A girl wearing shoes"></div>
            <div class="d-connect-row"><b class="d-number">2.</b><div class="speech-bubble speech-left"><div class="partial-sentence"><input class="line-input" data-type="text" data-answer="Nice" aria-label="Complete the phrase before bike"><span class="fixed-suffix">bike!</span></div></div><span class="connect-dot"></span><div class="d-link"><select data-type="select" data-answer="4" aria-label="Connect sentence 2"><option value="">Connect</option><option value="1">→ 1</option><option value="2">→ 2</option><option value="3">→ 3</option><option value="4">→ 4</option></select></div><span class="connect-dot"></span><div class="speech-bubble speech-right"><input class="line-input" data-type="text" data-answer="Thank you." aria-label="Reply for picture 2"></div><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-d-2.png" alt="A girl playing a guitar"></div>
            <div class="d-connect-row"><b class="d-number">3.</b><div class="speech-bubble speech-left"><div class="partial-sentence"><input class="line-input" data-type="text" data-answer="Nice" aria-label="Complete the phrase before dress"><span class="fixed-suffix">dress!</span></div></div><span class="connect-dot"></span><div class="d-link"><select data-type="select" data-answer="1" aria-label="Connect sentence 3"><option value="">Connect</option><option value="1">→ 1</option><option value="2">→ 2</option><option value="3">→ 3</option><option value="4">→ 4</option></select></div><span class="connect-dot"></span><div class="speech-bubble speech-right"><div class="speech-example">Thank you.</div></div><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-d-3.png" alt="A boy says thank you"></div>
            <div class="d-connect-row"><b class="d-number">4.</b><div class="speech-bubble speech-left"><div class="partial-sentence"><input class="line-input" data-type="text" data-answer="Nice" aria-label="Complete the phrase before guitar"><span class="fixed-suffix">guitar!</span></div></div><span class="connect-dot"></span><div class="d-link"><select data-type="select" data-answer="2" aria-label="Connect sentence 4"><option value="">Connect</option><option value="1">→ 1</option><option value="2">→ 2</option><option value="3">→ 3</option><option value="4">→ 4</option></select></div><span class="connect-dot"></span><div class="speech-bubble speech-right"><input class="line-input" data-type="text" data-answer="Thank you." aria-label="Reply for picture 4"></div><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u5-l3-d-4.png" alt="A boy with a bike"></div>
          </div>
        </div>

        <div class="section section-e">
          <div class="subtitle"><span class="section-label">E</span><span>What about you? Write.</span></div>
          <div class="personal-item"><label for="e1">1. Who do you go shopping with?</label><input id="e1" class="line-input personal-answer" data-type="text" data-answer="your own answer" placeholder="I go shopping with ..."></div>
          <div class="personal-item"><label for="e2">2. What cool clothes do you want to wear?</label><input id="e2" class="line-input personal-answer" data-type="text" data-answer="your own answer" placeholder="I want to wear ..."></div>
        </div>
      </div>
    </div>

    <div class="section actions"><button class="btn" type="button" onclick="checkAll()">Check answers</button> <button class="btn" type="button" onclick="resetAll()">Làm lại bài tập</button></div>
    <div id="result"></div>
  </div>
</div>
<script src="../../../../../engine/engine.js"></script>
<script>
  (() => {
    const originalCheckAll = window.checkAll;
    const originalResetAll = window.resetAll;
    window.checkAll = function () {
      document.querySelectorAll('.personal-answer').forEach(input => {
        input.dataset.answer = input.value.trim() || 'your own answer';
      });
      originalCheckAll();
      document.querySelectorAll('.d-connect-row').forEach(row => {
        const messages = [...row.querySelectorAll('.answer-text')].map(item => {
          const partial = item.closest('.partial-sentence');
          if (partial) return `Answer: Nice ${partial.querySelector('.fixed-suffix').textContent}`;
          return item.textContent.trim();
        });
        row.querySelectorAll('.answer-text').forEach(item => item.remove());
        if (messages.length) {
          const feedback = document.createElement('div');
          feedback.className = 'answer-text d-feedback';
          feedback.textContent = messages.join('  •  ');
          row.appendChild(feedback);
        }
      });
    };
    window.resetAll = function () {
      originalResetAll();
      document.querySelectorAll('.example-link').forEach(select => { select.disabled = true; });
    };
  })();
</script>
</body>
</html>
