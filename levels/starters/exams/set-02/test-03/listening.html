<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Starters – Listening Test 3</title>
<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:linear-gradient(180deg,#eaf6ff,#f7fbff);
}

.wrapper{
  max-width:calc(100vw - 120px);
  min-height:calc(100vh - 32px);
  margin:24px auto;
  padding:40px;
  background:#fff;
  border-radius:26px;
  box-shadow:0 24px 48px rgba(0,0,0,.14);
  display:flex;
  flex-direction:column;
}

h1{
  text-align:center;
  color:#3b82f6;
  margin:0;
  font-size:32px;
}

.main-layout{
  display:flex;
  flex-direction:column;
  gap:20px;
  margin-top:16px;
  flex:1;
  min-height:0;
}

.part-panel{
  background:#f5f9ff;
  border-radius:18px;
  padding:10px 14px;
}

.part-panel h2{
  margin:0 0 8px;
  text-align:center;
  color:#3b82f6;
  font-size:15px;
}

.part-list{
  list-style:none;
  padding:0;
  margin:0;
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
}

.part-list li{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  border-radius:12px;
  background:#eef4ff;
  cursor:pointer;
  font-size:14px;
}

.part-list li:hover{
  background:#e3edff;
}

.part-list a{
  font-weight:600;
  color:#1e3a8a;
  text-decoration:none;
}

.status{
  padding:3px 8px;
  border-radius:999px;
  font-size:11px;
  background:#e0e0e0;
}

.status.done{
  background:#2ecc71;
  color:#fff;
}

.content-panel{
  display:flex;
  flex-direction:column;
  min-height:0;
}

iframe{
  flex:1;
  width:100%;
  min-height:640px;
  border:none;
  border-radius:18px;
  box-shadow:0 14px 28px rgba(0,0,0,.10);
}

.submit-bar{
  margin-top:20px;
  text-align:center;
}

button{
  padding:14px 32px;
  border:none;
  border-radius:999px;
  background:#3b82f6;
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

button:disabled{
  opacity:.4;
  cursor:not-allowed;
}

@media (min-width:1600px){
  .wrapper{
    max-width:calc(100vw - 180px);
  }
}
</style>
</head>
<body>
<div class="wrapper">
  <h1>Starters – Listening Test 3</h1>

  <div class="main-layout">
    <!-- LEFT: PART PANEL -->
    <div class="part-panel">
      <h2>🎧 Parts</h2>
      <ul class="part-list">
        <li onclick="loadPart(1)">
          <span>Part 1</span>
          <span id="p1" class="status">Not done</span>
        </li>
        <li onclick="loadPart(2)">
          <span>Part 2</span>
          <span id="p2" class="status">Not done</span>
        </li>
        <li onclick="loadPart(3)">
          <span>Part 3</span>
          <span id="p3" class="status">Not done</span>
        </li>
        <li onclick="loadPart(4)">
          <span>Part 4</span>
          <span id="p4" class="status">Not done</span>
        </li>
      </ul>
    </div>

    <!-- RIGHT: CONTENT -->
    <div class="content-panel">
      <iframe id="partFrame"></iframe>

      <div class="submit-bar">
        <button id="submitListening" disabled>Submit Listening</button>
      </div>
    </div>
  </div>
</div>

<script>
function loadPart(part){
  document.getElementById('partFrame').src = 'listening/part' + part + '.html';
}
const PART_KEYS = {
  1: 'starters_set02_test03_part1_done',
  2: 'starters_set02_test03_part2_done',
  3: 'starters_set02_test03_part3_done',
  4: 'starters_set02_test03_part4_done'
};

const PART2_TOTAL = 5; // fixed number of questions in Part 2
let completed = 0;

function recalcCompleted(){
  completed = 0;
  [1,2,3,4].forEach(p=>{
    const el = document.getElementById('p'+p);
    if(el && el.classList.contains('done')){
      completed++;
    }
  });
}

function resetPartUI(){
  completed = 0;
  [1,2,3,4].forEach(p=>{
    const el = document.getElementById('p'+p);
    el.textContent = 'Not done';
    el.classList.remove('done');
  });
}

resetPartUI();

// restore done states on load
[1,2,3,4].forEach(p=>{
  if(localStorage.getItem(PART_KEYS[p])){
    setDone(p);
  }
});
document.getElementById('submitListening').disabled = (completed !== 4);

window.addEventListener('message', e => {
  if (!e.data || !e.data.type) return;

  if (e.data.type === 'LISTENING_PART_DONE') {
    const part = e.data.part;

    localStorage.setItem(PART_KEYS[part], 'true');
    setDone(part);

    document.getElementById('submitListening').disabled = (completed !== 4);
  }

  if (e.data.type === 'PART_RESET') {
    const part = e.data.part;

    // xoá trạng thái lưu
    localStorage.removeItem(PART_KEYS[part]);

    // cập nhật UI ngay lập tức
    const el = document.getElementById('p' + part);
    if (el) {
      el.textContent = 'Not done';
      el.classList.remove('done');
    }

    // tính lại completed từ UI (nguồn sự thật)
    recalcCompleted();
  }

  document.getElementById('submitListening').disabled = (completed !== 4);
});

function setDone(part){
  const el = document.getElementById('p'+part);
  if(el.classList.contains('done')) return; // chống đếm trùng
  el.textContent = 'Done';
  el.classList.add('done');
  recalcCompleted();
}

document.getElementById('submitListening').disabled = (completed !== 4);

/* === AUTO LOAD PART 1 (GIỐNG READING) === */
window.addEventListener('load', () => {
  const frame = document.getElementById('partFrame');
  if (frame && !frame.src) {
    loadPart(1);
  }
});

function highlightActivePart(part){
  document.querySelectorAll('.part-list li').forEach(li=>{
    li.classList.remove('active');
  });
  const active = document.querySelector(`.part-list li:nth-child(${part})`);
  if(active) active.classList.add('active');
}

// override loadPart to highlight
const _loadPart = loadPart;
loadPart = function(part){
  document.getElementById('partFrame').src = 'listening/part' + part + '.html';
  highlightActivePart(part);
};
</script>
</body>
</html>
