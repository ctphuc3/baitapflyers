<script>
  const imageCanvas = document.getElementById("imageCanvas");
  const imgCtx = imageCanvas.getContext("2d");
  const drawCanvas = document.getElementById("drawCanvas");
  const ctx = drawCanvas.getContext("2d");
  const answerCanvas = document.getElementById("answerCanvas");
  const answerCtx = answerCanvas.getContext("2d");
  const canvasWrap = document.getElementById("canvasWrap");
const audioEl = document.getElementById("audioPlayer");
if (audioEl) {
  audioEl.preload = "auto";

  audioEl.addEventListener("canplaythrough", () => {
    console.log("Audio ready to play");
  });

  audioEl.addEventListener("error", (e) => {
    console.error("Audio error", e, audioEl.error);
    alert("Không phát được audio. Khả năng cao là:\n- Server không cho stream\n- File mp3 lỗi\n- HTTPS bị chặn CORS");
  });
  audioEl.addEventListener("loadedmetadata", () => {
    console.log("Audio duration:", audioEl.duration);
  });
}
const answerBtn = document.getElementById("answerBtn");
const undoBtn = document.querySelector(".undo-btn");

let answerVisible = false;
let interactionLocked = false; // khóa vẽ & nhập chữ khi show answer
let answerUsed = false; // Show answer chỉ được dùng 1 lần
let allowSeek = false; // ❌ khóa tua trong lần nghe đầu
let lastAllowedTime = 0;

// Chỉ cho bấm Show answer sau khi audio kết thúc
if (audioEl && answerBtn) {
  answerBtn.disabled = true;
  audioEl.addEventListener("ended", () => {
    allowSeek = true;
    answerBtn.disabled = false;
    answerBtn.classList.add("audio-finished");
    answerUsed = false;
    answerBtn.textContent = "Show answer";

    saveToStorage();
  });
  audioEl.addEventListener("timeupdate", () => {
    if (!audioEl.paused) {
    saveToStorage();
    }
  });
}
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  let history = [];
  // Lưu mũi tên logic để chấm
  let arrows = []; // {fromX, fromY, toX, toY}

  // === Hotspots for START (names) ===
  const startHotspots = [
    { id: 'Pat',  px: 0.15, py: 0.04 },
    { id: 'Sam',  px: 0.39, py: 0.04 },
    { id: 'Anna', px: 0.62, py: 0.04 },
    { id: 'Dan',  px: 0.86, py: 0.04 },

    { id: 'Lucy', px: 0.17, py: 0.95 },
    { id: 'Nick', px: 0.50, py: 0.95 },
    { id: 'Tom',  px: 0.82, py: 0.95 }
  ];

  // === Hotspots for END (correct targets on image) ===
  const endHotspots = [
    { id: 'woman_red_coat',   px: 0.70, py: 0.28 },
    { id: 'fruit_seller',     px: 0.41, py: 0.40 },
    { id: 'girl_black_hair',  px: 0.80, py: 0.48 },
    { id: 'old_man',          px: 0.57, py: 0.62 },
    { id: 'boy_yellow_shirt', px: 0.67, py: 0.48 }
  ];

  // === Correct mapping (Name -> Target) ===
  const correctLinks = [
    { from: 'Pat',  to: 'woman_red_coat' },
    { from: 'Sam',  to: 'fruit_seller' },
    { from: 'Anna', to: 'girl_black_hair' },
    { from: 'Lucy', to: 'old_man' },
    { from: 'Tom',  to: 'boy_yellow_shirt' }
  ];

  // === HIT ZONES (only check arrow END point) ===
  // Coordinates are relative to current canvas size
function getHitZones() {
  return {
    woman_red_coat: {
      x: drawCanvas.width * 0.70,
      y: drawCanvas.height * 0.28,
      r: 120
    },
    fruit_seller: {
      x: drawCanvas.width * 0.41,
      y: drawCanvas.height * 0.40,
      r: 120
    },
    girl_black_hair: {
      x: drawCanvas.width * 0.80,
      y: drawCanvas.height * 0.48,
      r: 120
    },
    old_man: {
      x: drawCanvas.width * 0.57,
      y: drawCanvas.height * 0.62,
      r: 120
    },
    boy_yellow_shirt: {
      x: drawCanvas.width * 0.67,
      y: drawCanvas.height * 0.48,
      r: 120
    }
  };
}

  // Check if the arrow LINE (not just the end point) hits a character zone
  function hitArrow(a, zone) {
    // vector projection of circle center onto line segment
    const x1 = a.fromX, y1 = a.fromY;
    const x2 = a.toX,   y2 = a.toY;
    const cx = zone.x,  cy = zone.y;

    const dx = x2 - x1;
    const dy = y2 - y1;
    const lenSq = dx*dx + dy*dy;
    if (lenSq === 0) return false;

    let t = ((cx - x1)*dx + (cy - y1)*dy) / lenSq;
    t = Math.max(0, Math.min(1, t));

    const px = x1 + t*dx;
    const py = y1 + t*dy;

    return Math.hypot(px - cx, py - cy) <= zone.r;
  }

  // Check if the arrow END point hits a character zone
  function hitArrowEndOnly(a, zone) {
    return Math.hypot(a.toX - zone.x, a.toY - zone.y) <= zone.r;
  }

  function evaluateArrows() {
    let score = 0;
    const counted = new Set();

    arrows.forEach(a => {
      // Bỏ mũi tên không hợp lệ
      if (!a.start || !a.hit) return;

      // Chỉ chấm những tên có trong đáp án
      const link = correctLinks.find(c => c.from === a.start);
      if (!link) return; // loại Dan / Nick

      // Đúng cặp thì cộng điểm (mỗi tên chỉ 1 lần)
      if (link.to === a.hit && !counted.has(a.start)) {
        counted.add(a.start);
        score++;
      }
    });

    return score;
  }

  function saveState() {
    history.push(drawCanvas.toDataURL());
    if (history.length > 30) history.shift();
  }

  function undo() {
    if (history.length === 0) return;

    // Giảm số mũi tên nếu đang undo một mũi tên
    if (arrowCount > 0) {
      arrowCount--;
      if(arrows.length>0) arrows.pop();
    }

    // If not enough arrows anymore, notify parent to remove DONE
    if (arrowCount < MAX_ARROWS) {
      window.parent.postMessage({
        type: 'PART_RESET',
        part: 1
      }, '*');
    }

    const imgState = new Image();
    imgState.src = history.pop();
    imgState.onload = () => {
      ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      ctx.drawImage(imgState, 0, 0);
      saveToStorage(); // cập nhật lại arrowCount sau undo
    };
  }

  function getMousePos(drawCanvas, evt) {
    const rect = drawCanvas.getBoundingClientRect();
    const scaleX = drawCanvas.width / rect.width;
    const scaleY = drawCanvas.height / rect.height;

    return {
      x: (evt.clientX - rect.left) * scaleX,
      y: (evt.clientY - rect.top) * scaleY
    };
  }

  const img = new Image();
  img.src = "../assets/listening/part1/p1.png";

  const answerImg = new Image();
  answerImg.src = "../assets/listening/part1/p1_answer.png";

  // Đảm bảo ảnh đáp án luôn được vẽ đúng vào answerCanvas khi load xong
  answerImg.onload = () => {
    // vẽ lại đáp án khi ảnh load xong
    if (imageCanvas.width > 0 && imageCanvas.height > 0) {
      answerCtx.clearRect(0, 0, answerCanvas.width, answerCanvas.height);
      answerCtx.drawImage(
        answerImg,
        0,
        0,
        answerCanvas.width,
        answerCanvas.height
      );
    }
  };

  // ==== LOCALSTORAGE HELPERS ====
  const STORAGE_KEY = "starters_set02_test03_part1_state";

  function saveToStorage() {
    const state = {
      drawData: drawCanvas.toDataURL(),
      arrowCount,
      history, // ✅ lưu stack undo
      answerVisible,
      activeExplain: document.querySelector(".answer-tab.active")?.textContent || null,
      audioTime: audioEl ? audioEl.currentTime : 0,
      audioPlayed: allowSeek
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function loadFromStorage() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;

    try {
      const state = JSON.parse(raw);
      if (typeof state.arrowCount === "number") {
        arrowCount = state.arrowCount;
      } else {
        arrowCount = 0;
      }

      // reset arrows logic only (do NOT reset arrowCount)
      arrows = [];

      // Khôi phục history nếu có
      if (Array.isArray(state.history)) {
        history = state.history.slice(); // khôi phục stack undo
      }

      // Restore drawing
      if (state.drawData) {
        const imgState = new Image();
        imgState.src = state.drawData;
        imgState.onload = () => {
          ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
          ctx.drawImage(imgState, 0, 0);
        };
      }

      // === KHÔNG set audioEl.currentTime ở đây nữa ===

      // ⚠️ Sau khi reload: luôn khóa Show answer
      allowSeek = false;
      answerBtn.disabled = true;

      // Restore answer + explanation
      if (state.answerVisible) {
        if (state.activeExplain) {
          const idx = parseInt(state.activeExplain.replace("Answer ", ""), 10);
          if (!isNaN(idx)) showExplain(idx);
        }
      }

    } catch (e) {
      console.warn("Cannot restore state:", e);
    }
  }


function resizeCanvases() {
  // IMPORTANT: lock canvas size once user starts drawing
  if (arrowCount > 0) return;
  const canvasArea = document.querySelector(".canvas-area");

  // Fixed frame that always fits inside viewport
  const frameMaxW = Math.min(canvasArea.offsetWidth - 80, 900);
  const frameMaxH = Math.min(window.innerHeight - 260, 520);

  const scaleW = frameMaxW / img.width;
  const scaleH = frameMaxH / img.height;
  const scale = Math.min(scaleW, scaleH, 1);

  const displayW = Math.round(img.width * scale);
  const displayH = Math.round(img.height * scale);

  [imageCanvas, drawCanvas, answerCanvas].forEach(c => {
    c.width = displayW;
    c.height = displayH;
    c.style.width = displayW + "px";
    c.style.height = displayH + "px";
  });

  canvasWrap.style.width = displayW + "px";
  canvasWrap.style.height = displayH + "px";

  const answerBox = document.querySelector(".answer-box");
  answerBox.style.width = displayW + "px";

  answerCanvas.width = displayW;
  answerCanvas.height = displayH;
  answerCanvas.style.width = displayW + "px";
  answerCanvas.style.height = displayH + "px";

  imgCtx.clearRect(0, 0, displayW, displayH);
  imgCtx.drawImage(img, 0, 0, displayW, displayH);

  answerCtx.clearRect(0, 0, displayW, displayH);
  answerCtx.drawImage(answerImg, 0, 0, displayW, displayH);
}

let drawingArrow = false;
let startX = 0;
let startY = 0;
const MAX_ARROWS = 5;
let arrowCount = 0;

function updateArrowCounter(){
  if (arrowCount === MAX_ARROWS) {
    window.parent.postMessage({
      type: 'LISTENING_PART_DONE',
      part: 1
    }, '*');
  } else {
    window.parent.postMessage({
      type: 'PART_RESET',
      part: 1
    }, '*');
  }
}
arrows = [];

const arrowColors = [
  "#fbc02d", // mũi tên 1: vàng
  "#43a047", // mũi tên 2: xanh lá
  "#1e88e5", // mũi tên 3: xanh nước biển
  "#f3b6d8", // mũi tên 4: hồng nhạt
  "#e53935"  // mũi tên 5: đỏ
];

img.onload = () => {
  resizeCanvases();
};

function drawArrow(ctx, fromX, fromY, toX, toY, color) {
  const headLength = 16;
  const dx = toX - fromX;
  const dy = toY - fromY;
  const angle = Math.atan2(dy, dx);

  ctx.lineWidth = 4;
  ctx.strokeStyle = color;
  ctx.fillStyle = color;

  ctx.beginPath();
  ctx.moveTo(fromX, fromY);
  ctx.lineTo(toX, toY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(toX, toY);
  ctx.lineTo(
    toX - headLength * Math.cos(angle - Math.PI / 6),
    toY - headLength * Math.sin(angle - Math.PI / 6)
  );
  ctx.lineTo(
    toX - headLength * Math.cos(angle + Math.PI / 6),
    toY - headLength * Math.sin(angle + Math.PI / 6)
  );
  ctx.closePath();
  ctx.fill();
}

drawCanvas.addEventListener("mousedown", e => {
  if (interactionLocked) return;
  if (arrowCount >= MAX_ARROWS) return;
  const pos = getMousePos(drawCanvas, e);
  startX = pos.x;
  startY = pos.y;
  drawingArrow = true;
  saveState();
});

drawCanvas.addEventListener("mouseup", e => {
  if (!drawingArrow) return;
  if (arrowCount >= MAX_ARROWS) {
    drawingArrow = false;
    return;
  }
  // 1. Xác định tên bắt đầu (Pat / Sam / Anna / Lucy / Tom)
  let startName = null;

  for (const h of startHotspots) {
    const hx = h.px * drawCanvas.width;
    const hy = h.py * drawCanvas.height;

    // Nếu điểm bắt đầu đủ gần chữ (tolerance cho trẻ em)
    if (Math.hypot(startX - hx, startY - hy) <= 150) {
      startName = h.id;
      break;
    }
  }

  const pos = getMousePos(drawCanvas, e);
  const color = arrowColors[arrowCount];

  drawArrow(ctx, startX, startY, pos.x, pos.y, color);
  // Ensure arrowObj matches the required structure exactly
  const arrowObj = {
    fromX: startX,
    fromY: startY,
    toX: pos.x,
    toY: pos.y,
    start: startName,
    hit: null
  };

  // 2. Xác định người bị chạm
  let hitName = null;
  const zones = getHitZones();

  for (const [name, z] of Object.entries(zones)) {
    if (hitArrow(arrowObj, z)) {
      hitName = name;
      break;
    }
  }
  arrowObj.hit = hitName;     // người bị chạm

  arrows.push(arrowObj);

  arrowCount++;
  updateArrowCounter();
  drawingArrow = false;
  saveToStorage();
});

function resetCanvas() {
    // 1. Xóa nét vẽ
    ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    history = [];
    arrowCount = 0;
    arrows = [];
    updateArrowCounter();

    // Ẩn đáp án & giải thích
    answerVisible = false;
    document.querySelector(".answer-box").style.display = "none";
    document.getElementById("explanationPanel").style.display = "none";

    // Reset audio + khóa lại Show answer
    if (audioEl) {
      audioEl.pause();
      audioEl.currentTime = 0;
    }
    answerBtn.disabled = true;
    answerBtn.classList.remove("audio-finished");

    // Xóa toàn bộ dữ liệu lưu
    localStorage.removeItem(STORAGE_KEY);


    // Mở khóa tương tác
    interactionLocked = false;
    drawCanvas.style.pointerEvents = "auto";
    undoBtn.disabled = false;

    allowSeek = false;
    lastAllowedTime = 0;

    // 🔔 THÔNG BÁO FILE CHA: PART 1 BỊ RESET
    window.parent.postMessage({
      type: 'PART_RESET',
      part: 1
    }, '*');
}


function toggleAnswer() {
  // Đã bấm Show answer rồi thì cấm bấm lại
  if (answerUsed) return;

  answerUsed = true;
  answerVisible = true;

  const box = document.querySelector(".answer-box");
  const explainPanel = document.getElementById("explanationPanel");

  // === SHOW ANSWER (CHỈ 1 LẦN) ===
  box.style.display = "flex";
  explainPanel.style.display = "block";
  // Ép render + load Answer 1 ngay lần đầu để tránh lỗi layout
  requestAnimationFrame(() => {
    showExplain(1);
  });

  answerCanvas.width = imageCanvas.width;
  answerCanvas.height = imageCanvas.height;
  answerCanvas.style.width = imageCanvas.style.width;
  answerCanvas.style.height = imageCanvas.style.height;

  answerCtx.clearRect(0, 0, answerCanvas.width, answerCanvas.height);
  answerCtx.drawImage(answerImg, 0, 0, answerCanvas.width, answerCanvas.height);

  // Khóa toàn bộ tương tác
  interactionLocked = true;
  drawCanvas.style.pointerEvents = "none";

  // Khóa Undo
  undoBtn.disabled = true;

  // Khóa luôn nút Show answer
  answerBtn.disabled = true;
  answerBtn.classList.remove("audio-finished");
  answerBtn.textContent = "Answer shown";

  // 🔔 THÔNG BÁO FILE CHA: PART 1 ĐÃ SHOW ANSWER (theo logic mới)
  window.parent.postMessage({
    type: 'LISTENING_PART_DONE',
    part: 1
  }, '*');

  explainPanel.scrollIntoView({ behavior: "smooth", block: "start" });
  saveToStorage();
}

function showExplain(n) {
  const tabs = document.querySelectorAll(".answer-tab");
  const panel = document.getElementById("explanationPanel");
  // Create or get the answer text box elements
  let box = document.getElementById("answerTextBox");
  let label = document.getElementById("answerLabel");
  let text = document.getElementById("answerText");

  tabs.forEach(t => t.classList.remove("active"));
  tabs[n - 1].classList.add("active");

  // Remove old answerTextBox if exists in explain-content
  const explainContent = panel.querySelector(".explain-content");
  // Remove any answerTextBox in explainContent
  if (explainContent) {
    const oldBox = explainContent.querySelector("#answerTextBox");
    if (oldBox) explainContent.removeChild(oldBox);
  }

  // Hide old image if present
  const explainImg = document.getElementById("explainImage");
  if (explainImg) explainImg.style.display = "none";

  if (!box) {
    box = document.createElement("div");
    box.id = "answerTextBox";
    box.className = "answer-text-box";
    label = document.createElement("div");
    label.id = "answerLabel";
    label.style.fontWeight = "bold";
    label.style.marginBottom = "6px";
    text = document.createElement("div");
    text.id = "answerText";
    text.style.whiteSpace = "pre-line";
    box.appendChild(label);
    box.appendChild(text);
  }
  // Set color class for box
  box.className = "answer-text-box answer-" + n;
  // Optionally set background color directly for demo
  // Define colors for each answer
  const answerColors = {
    1: "#e3f2fd",
    2: "#e8f5e9",
    3: "#fffde7",
    4: "#fce4ec",
    5: "#fbe9e7"
  };
  box.style.background = answerColors[n] || "#f5f5f5";
  box.style.borderRadius = "14px";
  box.style.padding = "18px 20px";
  box.style.margin = "12px auto";
  box.style.maxWidth = "650px";
  box.style.boxShadow = "0 4px 16px rgba(30,136,229,0.08)";

  label.textContent = "Answer " + n;

  const answerTexts = {
    1: "Girl: Which teddy can I colour now?\\nWoman: The one on the poster.\\nGirl: (laughs) It's catching a ball.\\nWoman: Yes. Do that teddy blue.\\nGirl: OK. I'm doing that now.",
    2: "Woman: Look at that teddy. It's a clock!\\nGirl: Wow! Can I colour that teddy red?\\nWoman: OK. That's a good colour.\\nGirl: I'd like a teddy with a clock on it.\\nWoman: Me too.",
    3: "Girl: There's a very big teddy in this bedroom.\\nWoman: Between the bed and the desk?\\nGirl: Yes. I want to colour that teddy yellow.\\nWoman: OK. That's nice.",
    4: "Woman: Can you see that teddy on the chair?\\nGirl: (laughs) Yes, it's wearing glasses.\\nWoman: Colour that teddy green.\\nGirl: OK. That's a good colour.",
    5: "Woman: Let's colour a teddy brown now.\\nGirl: OK. Which one?\\nWoman: The teddy on the girl's dress.\\nGirl: On the girl's dress? OK.\\nWoman: Well done. This is a nice picture now."
  };

  text.innerHTML = (answerTexts[n] || "")
    .replaceAll("\\n", "<br>")
    .replaceAll("Girl:", "<strong>Girl:</strong>")
    .replaceAll("Woman:", "<strong>Woman:</strong>");

  // Add box to explain-content
  if (explainContent) {
    explainContent.appendChild(box);
  }
  saveToStorage();
}

// Restore state when page loads
window.addEventListener("load", () => {
  allowSeek = false;
  loadFromStorage();
  updateArrowCounter();
});

let userStartedAudio = false;

if (audioEl) {
  audioEl.addEventListener("play", () => {
    userStartedAudio = true;
  });

  audioEl.addEventListener("loadedmetadata", () => {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    try {
      const state = JSON.parse(raw);
      if (
        userStartedAudio &&
        typeof state.audioTime === "number"
      ) {
        audioEl.currentTime = Math.min(
          state.audioTime,
          audioEl.duration || state.audioTime
        );
      }
    } catch (e) {}
  });
}
function toggleUsage() {
  const usage = document.querySelector(".usage-guide");
  if (!usage) return;
  usage.classList.toggle("collapsed");
}
