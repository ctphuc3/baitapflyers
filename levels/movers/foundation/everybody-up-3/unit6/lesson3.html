<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 6 - Lesson 3 - Story</title>
  <link rel="stylesheet" href="../../../../../assets/css/style.css">
  <style>
    .lesson3-page .placeholder-image { display:block; width:100%; border:1px dashed #999; border-radius:12px; background:#f7f7f7; object-fit:contain; }
    .lesson3-page select { box-sizing:border-box; width:100%; padding:8px; border:1px solid #aaa; border-radius:8px; background:#fff; }
    .lesson3-page .answer-text { box-sizing:border-box; display:block; width:100%; min-width:0; margin-top:7px; padding:7px 10px; border-left:4px solid #2e9d50; border-radius:4px; background:#effaf2; line-height:1.35; white-space:nowrap; overflow-x:auto; }
    .lesson3-page .story-board { width:100%; aspect-ratio:1.55 / 1; overflow:hidden; border:1px dashed #999; border-radius:14px; background:#f7f7f7; }
    .lesson3-page .story-board > img { width:100%; height:100%; border:0; border-radius:0; object-fit:contain; }
    .lesson3-page .story-number-row { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:14px; margin-top:14px; }
    .lesson3-page .story-number-item { min-width:0; text-align:center; }
    .lesson3-page .story-number-label { display:block; margin-bottom:5px; font-weight:700; }
    .lesson3-page .story-number { box-sizing:border-box; width:54px; height:42px; margin:0; background:#fff; font-size:20px; }
    .lesson3-page .story-number-item > .answer-text { width:100%; padding:6px; font-size:14px; text-align:left; }
    .lesson3-page .match-list { display:flex; flex-direction:column; gap:13px; }
    .lesson3-page .match-row { display:grid; grid-template-columns:28px 190px minmax(0, 1fr); gap:10px; align-items:center; }
    .lesson3-page .match-row img { height:95px; }
    .lesson3-page .match-response { min-width:0; }
    .lesson3-page .match-response .answer-text { width:100%; }
    .lesson3-page .scramble-item { margin:18px 0 25px; }
    .lesson3-page .scramble-answer { display:grid; grid-template-columns:28px minmax(0, 1fr); gap:8px; align-items:center; }
    .lesson3-page .scramble-answer .line-input { box-sizing:border-box; width:100%; text-align:left; }
    .lesson3-page .scramble-answer .answer-text { grid-column:2; }
    .lesson3-page .scramble-words { display:flex; flex-wrap:wrap; justify-content:center; gap:10px 30px; margin:9px 0 0 36px; font-size:19px; font-weight:600; }
    .lesson3-page .dialogue-card { margin:17px 0 25px; padding:14px; border:1px solid #bbb; border-radius:16px; }
    .lesson3-page .dialogue-card > img { height:155px; margin-bottom:14px; }
    .lesson3-page .dialogue-lines { display:grid; gap:11px; }
    .lesson3-page .dialogue-line { display:grid; grid-template-columns:78px minmax(0, 1fr); gap:9px; align-items:center; }
    .lesson3-page .speaker { font-weight:700; }
    .lesson3-page .speech-bubble { min-width:0; padding:8px 12px; border:2px solid #666; border-radius:15px; background:#fff; }
    .lesson3-page .speech-bubble .line-input { box-sizing:border-box; width:100%; margin:0; text-align:left; }
    .lesson3-page .speech-bubble .answer-text { width:100%; }
    .lesson3-page .fixed-speech { color:#555; font-size:19px; font-weight:600; }
    @media (max-width:700px) {
      .lesson3-page .match-row { grid-template-columns:28px 145px minmax(0, 1fr); }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card workbook-page lesson3-page">
    <div class="title">Unit 6 - Helping Out · Lesson 3 - Story</div>

    <div class="workbook-spread">
      <div class="workbook-left">
        <div class="section section-a">
          <div class="subtitle"><span class="section-label">A</span><span>Number.</span></div>
          <!-- Replace YOUR_IMAGE_URL_A with one image containing all four story panels. -->
          <div class="story-board">
            <img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u6-l3-a.png" alt="Four-panel story about an invitation and a birthday party">
          </div>
          <div class="story-number-row">
            <div class="story-number-item"><span class="story-number-label">Picture 1</span><input class="story-number" data-type="text" data-answer="4" aria-label="Top-left story panel number"></div>
            <div class="story-number-item"><span class="story-number-label">Picture 2</span><input class="story-number" data-type="text" data-answer="1" aria-label="Top-right story panel number"></div>
            <div class="story-number-item"><span class="story-number-label">Picture 3</span><input class="story-number" data-type="text" data-answer="3" aria-label="Bottom-left story panel number"></div>
            <div class="story-number-item"><span class="story-number-label">Picture 4</span><input class="story-number" data-type="text" data-answer="2" aria-label="Bottom-right story panel number"></div>
          </div>
        </div>

        <div class="section section-b">
          <div class="subtitle"><span class="section-label">B</span><span>Match.</span></div>
          <div class="match-list">
            <div class="match-row"><b>1.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u6-l3-b-1.png" alt="Do you want to come over?"><div class="match-response"><select data-type="select" data-answer="Sure." aria-label="Match dialogue 1"><option value="">Choose the response...</option><option>Cool!</option><option>Sure.</option><option>Thank you.</option><option>Today. At 5:00.</option></select></div></div>
            <div class="match-row"><b>2.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u6-l3-b-2.png" alt="When?"><div class="match-response"><select data-type="select" data-answer="Today. At 5:00." aria-label="Match dialogue 2"><option value="">Choose the response...</option><option>Cool!</option><option>Sure.</option><option>Thank you.</option><option>Today. At 5:00.</option></select></div></div>
            <div class="match-row"><b>3.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u6-l3-b-3.png" alt="It's my brother's birthday party"><div class="match-response"><select data-type="select" data-answer="Cool!" aria-label="Match dialogue 3"><option value="">Choose the response...</option><option>Cool!</option><option>Sure.</option><option>Thank you.</option><option>Today. At 5:00.</option></select></div></div>
            <div class="match-row"><b>4.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u6-l3-b-4.png" alt="Happy birthday, Josh!"><div class="match-response"><select data-type="select" data-answer="Thank you." aria-label="Match dialogue 4"><option value="">Choose the response...</option><option>Cool!</option><option>Sure.</option><option>Thank you.</option><option>Today. At 5:00.</option></select></div></div>
          </div>
        </div>
      </div>

      <div class="workbook-right">
        <div class="section section-c">
          <div class="subtitle"><span class="section-label">C</span><span>Unscramble.</span></div>
          <div class="scramble-item"><div class="scramble-answer"><b>1.</b><input class="line-input" data-type="text" data-answer="Do you want to come over?" aria-label="Unscramble sentence 1"></div><div class="scramble-words"><span>od</span><span>oyu</span><span>anwt</span><span>ot</span><span>mcoe</span><span>vero</span><span>?</span></div></div>
          <div class="scramble-item"><div class="scramble-answer"><b>2.</b><input class="line-input" data-type="text" data-answer="Sure. When?" aria-label="Unscramble sentence 2"></div><div class="scramble-words"><span>ersu</span><span>.</span><span>ehwn</span><span>?</span></div></div>
          <div class="scramble-item"><div class="scramble-answer"><b>3.</b><input class="line-input" data-type="text" data-answer="After school." aria-label="Unscramble sentence 3"></div><div class="scramble-words"><span>rtfea</span><span>closoh</span><span>.</span></div></div>
        </div>

        <div class="section section-d">
          <div class="subtitle"><span class="section-label">D</span><span>Write.</span></div>
          <!-- Each URL can contain the two characters for one dialogue; speech fields remain interactive below. -->
          <div class="dialogue-card">
            <b>1.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u6-l3-d-1.png" alt="Two girls talking on the phone">
            <div class="dialogue-lines">
              <div class="dialogue-line"><span class="speaker">Girl 1:</span><div class="speech-bubble"><input class="line-input" data-type="text" data-answer="Do you want to come over?" aria-label="Dialogue 1 first line"></div></div>
              <div class="dialogue-line"><span class="speaker">Girl 2:</span><div class="speech-bubble fixed-speech">Sure. When?</div></div>
              <div class="dialogue-line"><span class="speaker">Girl 1:</span><div class="speech-bubble"><input class="line-input" data-type="text" data-answer="After school." aria-label="Dialogue 1 last line"></div></div>
            </div>
          </div>
          <div class="dialogue-card">
            <b>2.</b><img class="placeholder-image" src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/movers/foundation/everybody-up-3/u6-l3-d-2.png" alt="Two boys talking">
            <div class="dialogue-lines">
              <div class="dialogue-line"><span class="speaker">Boy 1:</span><div class="speech-bubble"><input class="line-input" data-type="text" data-answer="Do you want to come over?" aria-label="Dialogue 2 first line"></div></div>
              <div class="dialogue-line"><span class="speaker">Boy 2:</span><div class="speech-bubble"><input class="line-input" data-type="text" data-answer="Sure. When?" aria-label="Dialogue 2 second line"></div></div>
              <div class="dialogue-line"><span class="speaker">Boy 1:</span><div class="speech-bubble fixed-speech">On Saturday.</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="section actions"><button class="btn" type="button" onclick="checkAll()">Check answers</button> <button class="btn" type="button" onclick="resetAll()">Làm lại bài tập</button></div>
    <div id="result"></div>
  </div>
</div>
<script src="../../../../../engine/engine.js"></script>
</body>
</html>
