<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson 2 - Things to Do</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #cfefff, #eaf8ff);
}

.container {
  max-width: 1000px;
  margin: 30px auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
  font-size: 32px;
  color: #2c6fa3;
}

.section {
  margin-top: 25px;
}

.section h2 {
  color: #2c6fa3;
  margin-bottom: 15px;
}

.item {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 20px;
  align-items: center;
  background: rgba(255,255,255,0.6);
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 15px;
}

.img-box {
  width: 140px;
  height: 100px;
  border-radius: 16px;
  border: 2px dashed #9cc9e8;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2c6fa3;
  overflow: hidden;
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: white;
}

.options label {
  display: block;
  margin-bottom: 6px;
  font-size: 16px;
}

input[type="text"] {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 2px solid #9cc9e8;
}

button {
  margin-top: 20px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #4aa3df;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #2c6fa3;
}

.line {
  width: 100%;
  border: none;
  border-bottom: 2px solid #9cc9e8;
  margin: 10px 0;
  padding: 5px;
  font-size: 16px;
}

.line:focus {
  outline: none;
  border-bottom: 2px solid #4aa3df;
}

.line-text {
  border-bottom: 2px solid #9cc9e8;
  margin: 10px 0;
  padding: 5px;
  font-size: 16px;
}

.q {
  font-weight: bold;
  font-size: 18px;
  margin: 10px 0;
}
</style>
</head>
