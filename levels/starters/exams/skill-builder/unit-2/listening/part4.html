<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skills Builder Unit 2 Listening 4</title>

<link rel="stylesheet" href="../../../../css/starters-listening/part4.css">

<style>
:root{

--answer1-bg: rgba(156,39,176,0.15);
--answer2-bg: rgba(76,175,80,0.15);
--answer3-bg: rgba(33,150,243,0.15);
--answer4-bg: rgba(233,30,99,0.15);
--answer5-bg: rgba(255,235,59,0.20);

--answer1-pill: linear-gradient(180deg,#ce93d8,#ab47bc);
--answer2-pill: linear-gradient(180deg,#a5d6a7,#66bb6a);
--answer3-pill: linear-gradient(180deg,#90caf9,#42a5f5);
--answer4-pill: linear-gradient(180deg,#f48fb1,#ec407a);
--answer5-pill: linear-gradient(180deg,#fff59d,#fdd835);

}
</style>
</head>

<body>

<div class="wrapper">

<div class="global-header">
  <div class="part-title">
    <span class="badge">Listening, Part 4</span>
  </div>
</div>
  <div class="instruction">
    Listen and colour and write. There is one example.
  </div>

  <div class="controls-row">

    <div class="audio-box">
      <audio id="audioPlayer" controls preload="auto" playsinline controlslist="nodownload">
        <source src="https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/starters/exams/skills-builder/unit2/assets/listening/part4/skillbuilder-unit2-4.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <div class="top-actions">
    <div class="help-wrap">
      <div class="help-btn">?</div>
      <div class="help-tooltip">
        <strong>Cách làm bài</strong><br>
        • Nghe audio cẩn thận.<br>
        • Mỗi lần nghe, tìm đúng hình được nói đến.<br>
        • Chọn màu phù hợp và tô vào hình.<br>
        • Nhấn Undo để xóa nét vẽ.<br>
        • Sau khi nghe xong audio thì nhấn vào icon ổ khóa để xem đáp án.
      </div>
    </div>

    <button class="action-btn undo-btn" onclick="undo()" title="Undo">↩</button>
    <button class="action-btn reset-btn" onclick="resetCanvas()" title="Reset">↻</button>
    <button class="action-btn answer-btn" id="answerBtn" onclick="toggleAnswer()" disabled title="Show answer">🔒</button>
    <button class="action-btn palette-btn" id="paletteBtn" title="Colours">🎨</button>
    </div>

  </div>


  <div class="main-layout">

<div class="explanation-panel" id="explanationPanel">

  <div class="answer-tabs">
    <button class="answer-tab active" onclick="showExplain(1)">Answer 1</button>
    <button class="answer-tab" onclick="showExplain(2)">Answer 2</button>
    <button class="answer-tab" onclick="showExplain(3)">Answer 3</button>
    <button class="answer-tab" onclick="showExplain(4)">Answer 4</button>
    <button class="answer-tab" onclick="showExplain(5)">Answer 5</button>
  </div>

  <div class="explain-content">
    <div id="explainText" class="explain-text"></div>
  </div>

</div>

  <div class="sidebar">
    <div class="tools palette-panel" id="palettePanel">
      <div class="color-group">
        <div class="color active" data-color="red" style="background:red"></div>
        <div class="color" data-color="orange" style="background:orange"></div>
        <div class="color" data-color="yellow" style="background:gold"></div>
        <div class="color" data-color="green" style="background:green"></div>
        <div class="color" data-color="blue" style="background:blue"></div>
        <div class="color" data-color="purple" style="background:purple"></div>
        <div class="color" data-color="pink" style="background:pink"></div>
        <div class="color" data-color="#6E4B2A" style="background:#6E4B2A"></div>
        <div class="color" data-color="black" style="background:black"></div>
        <div class="color" data-color="white" style="background:white;border:3px solid #999"></div>
        <div class="color" data-color="grey" style="background:grey"></div>
        <div class="color" data-color="cyan" style="background:cyan"></div>
      </div>
    </div>
  </div>
  <div class="canvas-area">
    <div class="canvas-compare">
      <div class="canvas-box">
        <div id="canvasWrap" style="position:relative;">
          <canvas id="imageCanvas" style="position:absolute; left:0; top:0; z-index:1;"></canvas>
          <canvas id="drawCanvas" style="position:absolute; left:0; top:0; z-index:2;"></canvas>
        </div>
      </div>

      <div class="canvas-box answer-box">
        <canvas id="answerCanvas"></canvas>
      </div>
    </div>
  </div>
</div>


<script>
  const imageCanvas = document.getElementById("imageCanvas");
  const imgCtx = imageCanvas.getContext("2d");
  const drawCanvas = document.getElementById("drawCanvas");
  const ctx = drawCanvas.getContext("2d");
  const answerCanvas = document.getElementById("answerCanvas");
  const answerCtx = answerCanvas.getContext("2d");
  const canvasWrap = document.getElementById("canvasWrap");
  const audioEl = document.getElementById("audioPlayer");
const answerBtn = document.getElementById("answerBtn");
const undoBtn = document.querySelector(".undo-btn");

// ===== Palette toggle =====
const paletteBtn = document.getElementById("paletteBtn");
const palettePanel = document.getElementById("palettePanel");

if (paletteBtn && palettePanel) {

  paletteBtn.addEventListener("click", (e) => {
    e.stopPropagation();

    const rect = paletteBtn.getBoundingClientRect();
    // place bubble to the right of palette button and vertically center it
    const panelHeight = palettePanel.offsetHeight || 180;

    palettePanel.style.left = rect.right + 18 + "px"; // add more space between palette button and bubble
    palettePanel.style.top = rect.top + rect.height/2 - panelHeight/2 + "px";

    if (palettePanel.style.display === "block") {
      palettePanel.style.display = "none";
      palettePanel.classList.remove("show");
    } else {
      palettePanel.style.display = "block";
      palettePanel.style.pointerEvents = "auto";
      requestAnimationFrame(()=>palettePanel.classList.add("show"));
    }
  });

  // click outside → hide palette
  document.addEventListener("click", (e) => {
    if (!palettePanel.contains(e.target) && e.target !== paletteBtn) {
      palettePanel.style.display = "none";
      palettePanel.classList.remove("show");
    }
  });
}

// Chỉ cho bấm Show answer sau khi audio kết thúc
if (audioEl && answerBtn) {
  answerBtn.disabled = true;

  audioEl.addEventListener("ended", () => {
    answerBtn.disabled = false;
    answerBtn.classList.add("audio-finished");
    answerUsed = false;

    // change icon to key when audio finished
    answerBtn.textContent = "🔑";
  });
}
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  let history = [];

  function saveState() {
    history.push(drawCanvas.toDataURL());
    if (history.length > 30) history.shift();
  }

  function undo() {
    if (history.length === 0) return;
    const imgState = new Image();
    imgState.src = history.pop();
    imgState.onload = () => {
      ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      ctx.drawImage(imgState, 0, 0);
    };
  }

  function getMousePos(drawCanvas, evt) {
    const rect = drawCanvas.getBoundingClientRect();
    const scaleX = drawCanvas.width / rect.width;
    const scaleY = drawCanvas.height / rect.height;

    return {
      x: (evt.clientX - rect.left) * scaleX,
      y: (evt.clientY - rect.top) * scaleY
    };
  }

  function toggleUsage() {
    const usage = document.querySelector(".usage-guide");
    if (!usage) return;
    usage.classList.toggle("collapsed");
  }

  const BASE = "https://pub-a37ec6594f95498b9f771f725d6c9bd6.r2.dev/audio%26img/starters/exams/skills-builder/unit2/";

  const img = new Image();
  img.src = BASE + "assets/listening/part4/p4.png";

  const answerImg = new Image();
  answerImg.src = BASE + "assets/listening/part4/p4_answer.png";
  // Khi ảnh đáp án load xong thì luôn resize và vẽ lại canvas
  // Không phụ thuộc vào việc ảnh nền đã load trước hay chưa
  answerImg.onload = () => {
    resizeCanvases();
  };

  // ==== LOCALSTORAGE HELPERS ====
  const STORAGE_KEY = "skillbuilder_unit2_listening_part4_state";

  function saveToStorage() {
    const state = {
      drawData: drawCanvas.toDataURL(),
      currentColor,
      textInput: textInput.value,
      answerVisible,
      activeExplain: document.querySelector(".answer-tab.active")?.textContent || null
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function loadFromStorage() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;

    try {
      const state = JSON.parse(raw);

      // Restore drawing
      if (state.drawData) {
        const imgState = new Image();
        imgState.src = state.drawData;
        imgState.onload = () => {
          ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
          ctx.drawImage(imgState, 0, 0);
        };
      }

      // Restore color
      if (state.currentColor) {
        currentColor = state.currentColor;
        document.querySelectorAll(".color").forEach(c => {
          c.classList.toggle("active", c.dataset.color === currentColor);
        });
      }

      // Restore text input
      if (state.textInput !== undefined) {
        textInput.value = state.textInput;
      }

      // Restore answer + explanation
      if (state.answerVisible) {
        if (state.activeExplain) {
          const idx = parseInt(state.activeExplain.replace("Answer ", ""), 10);
          if (!isNaN(idx)) showExplain(idx);
        }
      }

    } catch (e) {
      console.warn("Cannot restore state:", e);
    }
  }


function resizeCanvases() {
  // Preserve current drawing before resizing (otherwise canvas resize clears it)
  let savedDrawing = null;
  if (drawCanvas && drawCanvas.width && drawCanvas.height) {
    try {
      savedDrawing = drawCanvas.toDataURL();
    } catch(e) {}
  }
  const canvasArea = document.querySelector(".canvas-area");

  // Fixed frame that always fits inside viewport (allow larger scaling and centering)
  const frameMaxW = Math.min(canvasArea.offsetWidth - 20, 1400);
  const frameMaxH = Math.min(window.innerHeight - 160, 900);

  const scaleW = frameMaxW / img.width;
  const scaleH = frameMaxH / img.height;
  const scale = Math.min(scaleW, scaleH);

  const displayW = Math.round(img.width * scale);
  const displayH = Math.round(img.height * scale);

  [imageCanvas, drawCanvas, answerCanvas].forEach(c => {
    c.width = displayW;
    c.height = displayH;
    c.style.width = displayW + "px";
    c.style.height = displayH + "px";
  });

  canvasWrap.style.width = displayW + "px";
  canvasWrap.style.height = displayH + "px";

  const answerBox = document.querySelector(".answer-box");
  answerBox.style.width = displayW + "px";
  answerBox.style.height = displayH + "px";

  answerCanvas.width = displayW;
  answerCanvas.height = displayH;
  answerCanvas.style.width = displayW + "px";
  answerCanvas.style.height = displayH + "px";

  imgCtx.clearRect(0, 0, displayW, displayH);
  imgCtx.drawImage(img, 0, 0, displayW, displayH);

  // Restore drawing after resize
  if (savedDrawing) {
    const restoreImg = new Image();
    restoreImg.src = savedDrawing;
    restoreImg.onload = () => {
      ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      ctx.drawImage(restoreImg, 0, 0, drawCanvas.width, drawCanvas.height);
    };
  }

  // Draw answer image aligned to the SAME aspect ratio as the question image
  answerCtx.clearRect(0, 0, displayW, displayH);
  if (answerVisible && answerImg.complete) {

    const baseRatio = img.width / img.height;
    const ansRatio = answerImg.width / answerImg.height;

    let sx = 0;
    let sy = 0;
    let sw = answerImg.width;
    let sh = answerImg.height;

    // crop answer image if ratios differ so it matches the question image frame
    if (ansRatio > baseRatio) {
      sw = answerImg.height * baseRatio;
      sx = (answerImg.width - sw) / 2;
    } else if (ansRatio < baseRatio) {
      sh = answerImg.width / baseRatio;
      sy = (answerImg.height - sh) / 2;
    }

    answerCtx.drawImage(
      answerImg,
      sx, sy, sw, sh,
      0, 0, displayW, displayH
    );
  }
}

  let painting = false;
  let currentColor = "red";
  let mode = "draw"; // draw | text

  // unlimited colouring
  let colorCount = 0;

img.onload = () => {
  resizeCanvases();
  history = [];
  saveState();

  // Nếu ảnh đáp án đã load trước đó thì vẽ lại
  if (answerImg.complete) {
    answerCtx.clearRect(0, 0, answerCanvas.width, answerCanvas.height);
    answerCtx.drawImage(answerImg, 0, 0, answerCanvas.width, answerCanvas.height);
  }
};
window.addEventListener("resize", resizeCanvases);

  document.querySelectorAll(".color").forEach(c => {
    c.addEventListener("click", () => {
      currentColor = c.dataset.color;
      document.querySelectorAll(".color").forEach(x => x.classList.remove("active"));
      c.classList.add("active");
      saveToStorage();
    });
  });

  drawCanvas.addEventListener("mousedown", () => {
    if (interactionLocked) return;

    saveState();
    painting = true;
  });
  
  drawCanvas.addEventListener("mouseup", () => {
    painting = false;
    saveToStorage();
  });
  drawCanvas.addEventListener("mouseleave", () => painting = false);

  drawCanvas.addEventListener("mousemove", e => {
    if (!painting || mode !== "draw") return;

    const pos = getMousePos(drawCanvas, e);

    ctx.fillStyle = currentColor;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 20, 0, Math.PI * 2);
    ctx.closePath();
    ctx.fill();
  });

function resetCanvas() {
    // 1. Xóa nét vẽ
    ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    history = [];

    // 2. Reset text
    mode = "draw";

    // 3. Reset màu về mặc định
    currentColor = "red";
    document.querySelectorAll(".color").forEach(c => {
      c.classList.toggle("active", c.dataset.color === "red");
    });

    // 4. Ẩn đáp án & giải thích
    answerVisible = false;
    document.querySelector(".answer-box").style.display = "none";
    document.getElementById("explanationPanel").style.display = "none";

    // 5. Reset audio + khóa lại Show answer
    if (audioEl) {
      audioEl.pause();
      audioEl.currentTime = 0;
    }
    answerBtn.disabled = true;
    answerBtn.classList.remove("audio-finished");

    // 6. Xóa toàn bộ dữ liệu lưu
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem('skillbuilder_unit2_listening_part4_done');

    // 🔔 THÔNG BÁO FILE CHA: PART 4 ĐÃ RESET
    window.parent.postMessage({
      type: 'PART_RESET',
      part: 4
    }, '*');

    // 7. Mở khóa tương tác
    interactionLocked = false;
    drawCanvas.style.pointerEvents = "auto";
    textToolBtn.style.pointerEvents = "auto";
    textInput.disabled = false;
    undoBtn.disabled = false;
}

let answerVisible = false;
let interactionLocked = false; // khóa vẽ & nhập chữ khi show answer
let answerUsed = false; // Show answer chỉ được dùng 1 lần

function toggleAnswer() {
  // Đã bấm Show answer rồi thì cấm bấm lại
  if (answerUsed) return;

  answerUsed = true;
  answerVisible = true;

  const box = document.querySelector(".answer-box");
  const explainPanel = document.getElementById("explanationPanel");

  // === SHOW ANSWER (CHỈ 1 LẦN) ===
  box.style.display = "flex";
  explainPanel.style.display = "block";
  // Ép render + load Answer 1 ngay lần đầu để tránh lỗi layout
  requestAnimationFrame(() => {
    showExplain(1);
  });

  answerCanvas.width = imageCanvas.width;
  answerCanvas.height = imageCanvas.height;
  answerCanvas.style.width = imageCanvas.style.width;
  answerCanvas.style.height = imageCanvas.style.height;

  // Ensure answer image always matches current canvas size
  resizeCanvases();
  answerCtx.clearRect(0, 0, answerCanvas.width, answerCanvas.height);
  if (answerImg.complete) {

    const baseRatio = img.width / img.height;
    const ansRatio = answerImg.width / answerImg.height;

    let sx = 0;
    let sy = 0;
    let sw = answerImg.width;
    let sh = answerImg.height;

    if (ansRatio > baseRatio) {
      sw = answerImg.height * baseRatio;
      sx = (answerImg.width - sw) / 2;
    } else if (ansRatio < baseRatio) {
      sh = answerImg.width / baseRatio;
      sy = (answerImg.height - sh) / 2;
    }

    answerCtx.drawImage(
      answerImg,
      sx, sy, sw, sh,
      0, 0, answerCanvas.width, answerCanvas.height
    );
  }

  // Khóa toàn bộ tương tác
  interactionLocked = true;
  drawCanvas.style.pointerEvents = "none";

  // Khóa Undo
  undoBtn.disabled = true;

  // Khóa luôn nút Show answer
  answerBtn.disabled = true;
  answerBtn.classList.remove("audio-finished");
  // change icon to unlocked lock after clicking
  answerBtn.textContent = "🔓";
  localStorage.setItem('skillbuilder_unit2_listening_part4_done', 'true');
  // notify parent listening page (ĐÚNG LOGIC: SHOW_ANSWER)
  try {
    window.parent.postMessage(
      { type: "LISTENING_PART_DONE", part: 4 },
      "*"
    );
  } catch(e){}

  explainPanel.scrollIntoView({ behavior: "smooth", block: "start" });
  saveToStorage();
}

function showExplain(n) {
  const explainText = document.getElementById("explainText");

  const panel = document.getElementById("explanationPanel");
  panel.classList.remove("answer-1","answer-2","answer-3","answer-4","answer-5");
  panel.classList.add("answer-" + n);

  const tabs = document.querySelectorAll(".answer-tab");
  tabs.forEach(t => t.classList.remove("active"));
  tabs[n - 1].classList.add("active");

  const explainScripts = {
    1: "Man: Now, colour the flowers under the tree – can you see them?\nBoy: The flowers under the tree … yes!\nMan: Yes. Have you got a purple pencil?\nBoy: Yes, I have.\nMan: Great! Colour them with that pencil, then.",
    2: "Man: There are some flowers on the car.\nBoy: Yes, I can see them.\nMan: Great. Colour those flowers now.\nBoy: What colour for the flowers on the car?\nMan: Would you like to colour them green?\nBoy: OK!",
    3: "Man: Now, find the flowers between the tree and the wall.\nBoy: Pardon? The flowers between the tree and the wall?\nMan: Yes. You can choose the colour.\nBoy: Cool! I choose blue! It’s my favourite colour!\nMan: I like it, too.",
    4: "Man: Can you see the flowers in front of the man?\nBoy: Yes, I can.\nMan: Good. Make those flowers pink.\nBoy: OK. I’m colouring the flowers… in front of the man, now.\nMan: Well done!",
    5: "Boy: Which flowers can I colour now?\nMan: Do you see the ones behind the cat? Colour those!\nBoy: Can I make them yellow?\nMan: OK. What a nice garden!"
  };

  let script = explainScripts[n] || "";

  // Bold speaker names
  script = script.replace(/(Man:|Boy:)/g, '<strong>$1</strong>');

  // Convert line breaks to <br>
  script = script.replace(/\n/g, '<br>');

  // Add answer heading on top
  explainText.innerHTML = `<strong>Answer ${n}</strong><br>${script}`;
  saveToStorage();
}

// Restore state when page loads
window.addEventListener("load", () => {
  loadFromStorage();
});
</script>

</body>
</html>
