<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Starters – Reading & Writing Test 3</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:linear-gradient(180deg,#eaf6ff,#f7fbff);
}
.wrapper{
  max-width:calc(100vw - 120px);  /* THU VÔ 1 CHÚT ĐỂ LỘ NỀN */
  min-height:calc(100vh - 32px);
  margin:24px auto;               /* tăng nhẹ khoảng thở */
  padding:40px;
  background:#fff;
  border-radius:26px;
  box-shadow:0 24px 48px rgba(0,0,0,.14);
  display:flex;
  flex-direction:column;
}
h1{
  text-align:center;
  color:#1e88e5;
  margin-top:0;
}
ul{
  list-style:none;
  padding:0;
}
li{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  margin-bottom:12px;
  border-radius:16px;
  background:#f0f6ff;
}
a{
  font-weight:700;
  text-decoration:none;
  color:#1e3a8a;
}
.status{
  padding:6px 14px;
  border-radius:999px;
  font-size:13px;
  background:#e0e0e0;
}
.status.done{
  background:#2ecc71;
  color:#fff;
}
button{
  margin-top:24px;
  padding:12px 24px;
  border:none;
  border-radius:999px;
  background:#1e88e5;
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
button:disabled{
  opacity:.4;
  cursor:not-allowed;
}
/* === 2-column layout for reading page === */
.main-layout{
  display:flex;
  flex-direction:column;
  gap:20px;
  margin-top:20px;
  flex:1;
  min-height:0;
}
.part-panel{
  background:#f5f9ff;
  border-radius:20px;
  padding:12px 16px;
}
.part-panel h2{
  margin-top:0;
  font-size:18px;
  color:#1e88e5;
  text-align:center;
}
.part-panel ul{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.part-panel ul li{
  cursor:pointer;
  transition:.2s;
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 14px;
  margin:0;
  background:#eef4ff;
  border-radius:14px;
}
.part-panel ul li:hover{
  background:#e6f0ff;
}
.content-panel{
  display:flex;
  flex-direction:column;
  flex:1;
  min-height:0;
}
iframe{
  flex:1;
  width:100%;
  min-height:720px;
}
.submit-bar{
  margin-top:16px;
  text-align:center;
}
@media (min-width: 1600px){
  .wrapper{
    max-width:calc(100vw - 180px);
  }
}

@media (min-width: 1800px){
  .wrapper{
    max-width:1700px;   /* tránh quá rộng gây mỏi mắt */
  }
}
</style>
</head>

<body>
<div class="wrapper">

<h1>Starters – Reading & Writing Test 3</h1>


<div class="main-layout">

  <div class="part-panel">
    <h2>📘 Parts</h2>
    <ul>
      <li onclick="loadPart(1)">
        <span>Part 1</span>
        <span id="r1" class="status">Not done</span>
      </li>
      <li onclick="loadPart(2)">
        <span>Part 2</span>
        <span id="r2" class="status">Not done</span>
      </li>
      <li onclick="loadPart(3)">
        <span>Part 3</span>
        <span id="r3" class="status">Not done</span>
      </li>
      <li onclick="loadPart(4)">
        <span>Part 4</span>
        <span id="r4" class="status">Not done</span>
      </li>
      <li onclick="loadPart(5)">
        <span>Part 5</span>
        <span id="r5" class="status">Not done</span>
      </li>
    </ul>
  </div>

  <div class="content-panel">
    <iframe
      id="partFrame"
      style="width:100%;height:720px;border:none;border-radius:18px;box-shadow:0 14px 28px rgba(0,0,0,.10);">
    </iframe>

    <div class="submit-bar">
      <button id="submitReading" disabled>Submit Reading</button>
    </div>
  </div>

</div>

</div>

<script>
function loadPart(part){
  const frame = document.getElementById('partFrame');
  frame.src = `./reading/part${part}.html`;
}
// ===== STORAGE KEYS =====
const READING_KEYS = {
  1: 'starters_set02_test03_reading_part1_done',
  2: 'starters_set02_test03_reading_part2_done',
  3: 'starters_set02_test03_reading_part3_done',
  4: 'starters_set02_test03_reading_part4_done',
  5: 'starters_set02_test03_reading_part5_done'
};

let completed = 0;
let doneParts = new Set();

function setDone(part){
  const el = document.getElementById('r'+part);
  if (!el.classList.contains('done')) {
    el.textContent = 'Done';
    el.classList.add('done');
    doneParts.add(part);
    completed = doneParts.size;
  }
}
function unsetDone(part){
  const el = document.getElementById('r'+part);
  el.textContent = 'Not done';
  el.classList.remove('done');
  doneParts.delete(part);
  completed = doneParts.size;
}

// ===== CHECK LOCALSTORAGE ON LOAD =====
[1,2,3,4,5].forEach(p=>{
  const key = READING_KEYS[p];
  if(localStorage.getItem(key) === 'done'){
    setDone(p);
  } else {
    unsetDone(p);
  }
});
document.getElementById('submitReading').disabled = (completed !== 5);

// ===== LISTEN MESSAGE FROM PARTS =====
window.addEventListener("message", (e)=>{
  if(!e.data || !e.data.type) return;

  const { type, part } = e.data;
  if(!READING_KEYS[part]) return;

  // ===== PART DONE =====
  if(type === "READING_PART_DONE"){
    localStorage.setItem(READING_KEYS[part], 'done');
    setDone(part);
    document.getElementById('submitReading').disabled = (completed !== 5);
  }

  // ===== PART RESET =====
  if(type === "READING_PART_RESET"){
    // CHỈ reset khi người dùng bấm Reset thật
    if(e.data.manual === true){
      localStorage.removeItem(READING_KEYS[part]);
      unsetDone(part);
      document.getElementById('submitReading').disabled = true;
    }
  }
});

// ===== LISTEN STORAGE CHANGE (FOR NEW TAB / RELOAD CASE) =====
window.addEventListener('storage', (e) => {
  const part = Object.keys(READING_KEYS).find(
    k => READING_KEYS[k] === e.key
  );

  if (!part) return;

  if (e.newValue === 'done') {
    setDone(Number(part));
  } else {
    unsetDone(Number(part));
  }

  document.getElementById('submitReading').disabled = (completed !== 5);
});
</script>

</body>
</html>
